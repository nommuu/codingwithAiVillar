<!DOCTYPE html>
<html>
<head>
  <title>Grade Calculator</title>
  <style>
    body { font-family: Arial; text-align: center; margin-top: 100px; }
    input, button { padding: 8px; margin: 5px; }
  </style>
</head>
<body>

<h2>Grade Calculator</h2>
<input type="number" id="grade" placeholder="Enter grade">
<button onclick="check()">Check Result</button>
<p id="result"></p>

<script>
function check() {
  let g = document.getElementById("grade").value;

  if (g < 0 || g > 100 || g === "") {
    result.textContent = "Enter a valid grade (0-100).";
  } else if (g >= 75) {
    result.textContent = "Passed";
  } else {
    result.textContent = "Failed";
  }
}
</script>

</body>
</html>

<!-- My prompt tells the AI to create a simple Grade Calculator website using HTML, CSS, and JavaScript. 
I asked it to add a box where users can enter a grade from 0 to 100, a 'Check Result' button, and an area to display the result. 

I also instructed the AI to show 'Passed' if the grade is 75 or higher, show 'Failed' if it is below 75, 
display an error message for invalid input, and keep the design clean and easy to understand. -->
